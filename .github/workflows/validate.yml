name: Validate skill

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build dist artifact
        run: npm run package
      - name: Run validation and behavior scenarios
        run: npm run validate
